services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chatbot-demo:latest
    container_name: chatbot-demo
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    environment:
      APP_NAME: "Korepetycje Demo"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      APP_KEY: ${APP_KEY}
      DEMO_MODE: "true"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/app.db
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: sync
      LOG_CHANNEL: stderr
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TRUSTED_PROXIES: "*"
